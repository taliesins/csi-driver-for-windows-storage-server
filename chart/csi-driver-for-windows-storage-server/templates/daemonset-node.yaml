{{- $root := . -}}
{{- $key := "windows-storage" -}}
{{- $driver := mergeOverwrite (include "csi-driver-for-windows-storage-server.driverDefaults" . | fromYaml) (get (.Values.drivers | default dict) $key | default dict) -}}
{{- if $driver.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "csi-driver-for-windows-storage-server.driverNodeName" (dict "root" $root "key" $key) }}
  labels:
    {{- include "csi-driver-for-windows-storage-server.labels" $root | nindent 4 }}
    app.kubernetes.io/csi-driver: {{ $key | quote }}
    app.kubernetes.io/component: "node"
spec:
  selector:
    matchLabels:
      {{- include "csi-driver-for-windows-storage-server.driverSelectorLabels" (dict "root" $root "key" $key "component" "node") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "csi-driver-for-windows-storage-server.labels" $root | nindent 8 }}
        app.kubernetes.io/csi-driver: {{ $key | quote }}
        app.kubernetes.io/component: "node"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: {{ include "csi-driver-for-windows-storage-server.nodeServiceAccountName" $root }}
      containers:
        - name: node-driver
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
            allowPrivilegeEscalation: true
          image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag | default $root.Chart.AppVersion }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          args:
            - --endpoint=$(CSI_ENDPOINT)
            {{- if $driver.needsIscsi }}
            - --nodeid-file=/host{{ $root.Values.node.initiatorNamePath }}
            {{- end }}
            - --mode=node
            - --drivername={{ $driver.name }}
            - --debug={{ $root.Values.debug }}
            - --kubernetes-integration=true
            - --liveness-port={{ $driver.livenessPort }}
            - --kubelet-registration-path=/var/lib/kubelet/plugins/{{ $driver.name }}/csi.sock
            - --v={{ $root.Values.logLevel }}
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: CSI_DRIVER_RUN_DIR
              value: /var/run
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
            - name: mountpoint-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            {{- if $driver.needsIscsi }}
            - name: host-dev
              mountPath: /dev
            {{- end }}
            - name: host-root
              mountPath: /host
              mountPropagation: HostToContainer
            {{- if $driver.needsIscsi }}
            - name: chroot-iscsiadm
              mountPath: /sbin/iscsiadm
              subPath: iscsiadm
            {{- end }}
            - name: csi-run-dir
              mountPath: /var/run/{{ $driver.name }}
          ports:
            - containerPort: {{ $driver.livenessPort }}
              name: healthz
              protocol: TCP
      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/{{ $driver.name }}
            type: DirectoryOrCreate
        - name: mountpoint-dir
          hostPath:
            path: /var/lib/kubelet
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        {{- if $driver.needsIscsi }}
        - name: host-dev
          hostPath:
            path: /dev
        {{- end }}
        - name: host-root
          hostPath:
            path: /
            type: Directory
        {{- if $driver.needsIscsi }}
        - name: chroot-iscsiadm
          configMap:
            defaultMode: 0555
            name: {{ include "csi-driver-for-windows-storage-server.driverNodeName" (dict "root" $root "key" $key) }}-iscsiadm
        {{- end }}
        - name: csi-run-dir
          hostPath:
            path: /var/run/{{ $driver.name }}
            type: DirectoryOrCreate
{{- end }}
{{- if and $driver.enabled $driver.needsIscsi }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "csi-driver-for-windows-storage-server.driverNodeName" (dict "root" $root "key" $key) }}-iscsiadm
  labels:
    {{- include "csi-driver-for-windows-storage-server.labels" $root | nindent 4 }}
    app.kubernetes.io/csi-driver: {{ $key | quote }}
    app.kubernetes.io/component: "node"
data:
  iscsiadm: |
    #!/bin/sh
    if [ -x /host/sbin/iscsiadm ]; then
      chroot /host /sbin/iscsiadm "$@"
    elif [ -x /host/usr/local/sbin/iscsiadm ]; then
      chroot /host /usr/local/sbin/iscsiadm "$@"
    elif [ -x /host/bin/iscsiadm ]; then
      chroot /host /bin/iscsiadm "$@"
    elif [ -x /host/usr/local/bin/iscsiadm ]; then
      chroot /host /usr/local/bin/iscsiadm "$@"
    else
      chroot /host iscsiadm "$@"
    fi
{{- end }}
