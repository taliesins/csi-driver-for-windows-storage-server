name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  reviewgpt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ReviewGPT
        uses: ReviewGPT/ReviewGPT@v0.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Optionally, you can set model, language, and other options here
          # model: gpt-3.5-turbo
          # language: en
