apiVersion: v1
kind: PersistentVolume
metadata:
  name: static-nodeonly-smb
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: windows-storage.csi.windows.microsoft.com
    volumeHandle: "static-nodeonly-smb"
    nodeStageSecretRef:
      name: static-smb-credentials
      namespace: apps
    volumeAttributes:
      protocol: "smb"
      smbServer: "win-storage.lab.local"
      smbShareName: "static-nodeonly-smb"
      smbVersion: "3.1.1"
