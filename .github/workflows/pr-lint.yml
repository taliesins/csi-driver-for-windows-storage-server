name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            style
            perf
          subjectPattern: ^((bump)|[A-Z]).+$
          subjectPatternError: |
            The PR title must follow the conventional commits format (e.g., 'feat: Add new feature', 'fix: Resolve bug').
            Allowed types: feat, fix, chore, docs, refactor, test, style, perf.
            The subject must start with a capital letter.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint commit messages
        run: bunx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose
