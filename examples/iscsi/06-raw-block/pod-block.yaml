apiVersion: v1
kind: Pod
metadata:
  name: wal-writer
  namespace: apps
spec:
  nodeSelector:
    kubernetes.io/os: linux
  containers:
    - name: app
      image: ubuntu:24.04
      command: ["bash", "-lc", "sleep infinity"]
      volumeDevices:
        - name: wal
          devicePath: /dev/walraw
  volumes:
    - name: wal
      persistentVolumeClaim:
        claimName: db-wal-raw
