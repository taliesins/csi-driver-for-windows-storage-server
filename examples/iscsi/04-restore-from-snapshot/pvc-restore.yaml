apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data-restore
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: iscsi-for-windows-rwo
  dataSource:
    name: db-data-snap-1
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
  resources:
    requests:
      storage: 1Gi
