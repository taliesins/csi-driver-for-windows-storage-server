apiVersion: v1
kind: Pod
metadata:
  name: pg
  namespace: apps
spec:
  nodeSelector:
    kubernetes.io/os: linux
  containers:
    - name: postgres
      image: postgres:16
      env:
        - { name: POSTGRES_PASSWORD, value: example }
      volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: db-data
