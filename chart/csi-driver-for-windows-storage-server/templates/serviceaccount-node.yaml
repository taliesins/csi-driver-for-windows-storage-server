{{- if .Values.node.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "csi-driver-for-windows-storage-server.nodeServiceAccountName" . }}
  labels:
    {{- include "csi-driver-for-windows-storage-server.labels" . | nindent 4 }}
  {{- with .Values.node.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.node.serviceAccount.automount }}
{{- end }}
