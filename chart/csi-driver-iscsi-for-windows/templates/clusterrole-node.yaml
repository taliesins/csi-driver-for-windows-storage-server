apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "csi-driver-iscsi-for-windows.fullname" . }}-node
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "secrets", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes", "volumeattachments"]
    verbs: ["get", "list", "watch"]
