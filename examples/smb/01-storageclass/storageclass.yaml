apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: smb-for-windows-rwx
provisioner: smb.csi.windows.microsoft.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  shareBackend: "directory"
  shareParentPath: "E:\\SmbShares"
  smbServer: "win-storage.lab.local"
  smbChangeAccess: "EXAMPLE\\storage-user"
  smbEncryptData: "true"

  csi.storage.k8s.io/node-stage-secret-name: "smb-credentials"
  csi.storage.k8s.io/node-stage-secret-namespace: "${pvc.namespace}"
