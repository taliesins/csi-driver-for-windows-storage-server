apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-nfs-vhdx-restore
  namespace: apps
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-vhdx-for-windows-rwx
  dataSource:
    name: shared-nfs-vhdx-snap-1
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
  resources:
    requests:
      storage: 1Gi
