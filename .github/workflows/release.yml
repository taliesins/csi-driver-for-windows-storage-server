name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: Preview the next version and changelog without creating a tag
        required: false
        default: 'false'

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GHCR_PASSWORD }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PASSWORD }}
          GH_TOKEN: ${{ secrets.GHCR_PASSWORD }}
          HUSKY: 0
        run: |
          if [[ -z "${GITHUB_TOKEN}" ]]; then
            echo "The GHCR_PASSWORD secret must contain a token that can push release commits and tags."
            exit 1
          fi

          if [[ "${{ inputs.dryRun }}" == "true" ]]; then
            bunx semantic-release --dry-run
          else
            bunx semantic-release
          fi
