name: Cleanup Artifacts

on:
  schedule:
    - cron: '0 0 * * *'
  delete:
  push:
    branches:
      - main
      - 'pr/**'
  workflow_dispatch:

jobs:
  cleanup-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete PR images, old dev builds, and untagged container versions
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const ownerType = context.payload.repository.owner.type;
            const packageName = 'csi-driver-for-windows-storage-server';
            const prTagPrefix = 'pr-';
            const devTagPrefix = 'dev-';

            const getVersions = async (targetPackage) => {
              const params = {
                package_type: 'container',
                package_name: targetPackage,
                per_page: 100,
              };

              const method = ownerType === 'User'
                ? github.rest.packages.getAllPackageVersionsForPackageOwnedByUser
                : github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg;

              if (ownerType === 'User') {
                params.username = owner;
              } else {
                params.org = owner;
              }

              const { data } = await method(params);
              return data;
            };

            const deleteVersion = async (targetPackage, versionId) => {
              const params = {
                package_type: 'container',
                package_name: targetPackage,
                package_version_id: versionId,
              };

              const method = ownerType === 'User'
                ? github.rest.packages.deletePackageVersionForUser
                : github.rest.packages.deletePackageVersionForOrg;

              if (ownerType === 'User') {
                params.username = owner;
              } else {
                params.org = owner;
              }

              await method(params);
            };

            try {
              const versions = await getVersions(packageName);
              const devBuilds = [];

              for (const version of versions) {
                const tags = version.metadata?.container?.tags || [];
                const isTaggedRelease = tags.some((tag) => /^\d+\.\d+\.\d+/.test(tag) || tag === 'latest');
                const isDevBuild = tags.some((tag) => tag.startsWith(devTagPrefix));
                const isPrBuild = tags.some((tag) => tag.startsWith(prTagPrefix));
                const isUntagged = tags.length === 0;

                if (!isTaggedRelease && (isPrBuild || isUntagged)) {
                  core.info(`Deleting container version ${version.id} (${tags.join(', ') || 'untagged'})`);
                  await deleteVersion(packageName, version.id);
                } else if (isDevBuild) {
                  devBuilds.push(version);
                }
              }

              devBuilds.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

              for (const version of devBuilds.slice(5)) {
                core.info(`Deleting old dev container build ${version.id}`);
                await deleteVersion(packageName, version.id);
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`Container package '${packageName}' was not found: ${error.message}`);
              } else {
                throw error;
              }
            }

  cleanup-helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete PR charts and old dev Helm package versions
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const ownerType = context.payload.repository.owner.type;
            const packageName = 'helm/csi-driver-for-windows-storage-server';
            const prTagPrefix = '0.0.0-pr';
            const devTagPrefix = '0.0.0-dev';

            const getVersions = async (targetPackage) => {
              const params = {
                package_type: 'container',
                package_name: targetPackage,
                per_page: 100,
              };

              const method = ownerType === 'User'
                ? github.rest.packages.getAllPackageVersionsForPackageOwnedByUser
                : github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg;

              if (ownerType === 'User') {
                params.username = owner;
              } else {
                params.org = owner;
              }

              const { data } = await method(params);
              return data;
            };

            const deleteVersion = async (targetPackage, versionId) => {
              const params = {
                package_type: 'container',
                package_name: targetPackage,
                package_version_id: versionId,
              };

              const method = ownerType === 'User'
                ? github.rest.packages.deletePackageVersionForUser
                : github.rest.packages.deletePackageVersionForOrg;

              if (ownerType === 'User') {
                params.username = owner;
              } else {
                params.org = owner;
              }

              await method(params);
            };

            try {
              const versions = await getVersions(packageName);
              const devBuilds = [];

              for (const version of versions) {
                const tags = version.metadata?.container?.tags || [];
                const isTaggedRelease = tags.some((tag) => /^\d+\.\d+\.\d+/.test(tag));
                const isDevBuild = tags.some((tag) => tag.startsWith(devTagPrefix));
                const isPrBuild = tags.some((tag) => tag.startsWith(prTagPrefix));

                if (!isTaggedRelease && isPrBuild) {
                  core.info(`Deleting PR Helm chart version ${version.id} (${tags.join(', ')})`);
                  await deleteVersion(packageName, version.id);
                } else if (isDevBuild) {
                  devBuilds.push(version);
                }
              }

              devBuilds.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

              for (const version of devBuilds.slice(5)) {
                core.info(`Deleting old dev Helm chart version ${version.id}`);
                await deleteVersion(packageName, version.id);
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`Helm chart package '${packageName}' was not found: ${error.message}`);
              } else {
                throw error;
              }
            }
