apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-for-windows-rwx
provisioner: nfs.csi.windows.microsoft.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  shareBackend: "directory"
  shareParentPath: "E:\\NfsShares"
  nfsServer: "win-storage.lab.local"
  nfsClientName: "*"
  nfsPermission: "readwrite"
  nfsAllowRootAccess: "true"
  # Optional: enable Windows Server for NFS Kerberos authentication. Supported
  # values are sys, krb5, krb5i, and krb5p. The node mounts with the strongest
  # Kerberos flavor listed unless nfsMountAuthentication is set explicitly.
  # nfsAuthentication: "krb5p"
  # nfsMountAuthentication: "krb5p"
  # Shortcut equivalent to nfsAuthentication/nfsMountAuthentication: "krb5".
  # nfsKerberos: "true"
