apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: iscsi-for-windows-rwo
provisioner: windows-storage.csi.windows.microsoft.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  protocol: "iscsi"
  targetPortal: "win-storage.lab.local"
  # Optional: portalPort defaults to 3260.
  # portalPort: "3260"
  # Optional: vhdxParentPath defaults to the Windows server's
  # CSI_VHDX_PARENT_PATH value, or %SystemDrive%\iSCSIVirtualDisks.
  # vhdxParentPath: "E:\\iSCSIVirtualDisks"
  # Optional: set iqnPrefix to force target IQNs like
  # iqn.2025-08.lab.example:<volumeName>. If omitted, Windows generates the
  # TargetIqn and the driver returns that value to the node.

  # Optional: filesystem type defaults to ext4.
  # csi.storage.k8s.io/fstype: "xfs"

  # Optional CHAP credentials. Leave unset unless you want the controller to
  # configure Windows target CHAP and the node to log in with CHAP. Use the
  # same Secret for provisioning, controller publish, and node stage so both
  # sides see matching credentials.
  # csi.storage.k8s.io/provisioner-secret-name: "iscsi-chap"
  # csi.storage.k8s.io/provisioner-secret-namespace: "${pvc.namespace}"
  # csi.storage.k8s.io/controller-publish-secret-name: "iscsi-chap"
  # csi.storage.k8s.io/controller-publish-secret-namespace: "${pvc.namespace}"
  # csi.storage.k8s.io/node-stage-secret-name: "iscsi-chap"
  # csi.storage.k8s.io/node-stage-secret-namespace: "${pvc.namespace}"
  # iface: "default"
