name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'goreleaser.yaml'
      - 'chart/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/ci.yml'
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: taliesins/csi-driver-for-windows-storage-server
  CHART_NAME: csi-driver-for-windows-storage-server
  CHART_PATH: chart/csi-driver-for-windows-storage-server

jobs:
  check-and-build:
    if: |
      !startsWith(github.ref, 'refs/tags/v') &&
      !(
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
        startsWith(github.event.head_commit.message, 'chore(release):')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run Go tests
        run: go test -v ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: v0.70.0
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci
          scanners: vuln
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          hide-progress: true

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.20.2

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

  build-and-push:
    if: |
      always() &&
      github.event_name == 'push' &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        needs.check-and-build.result == 'success'
      )
    needs: check-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine versions
        id: versions
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CHART_NAME: ${{ env.CHART_NAME }}
        run: |
          set -euo pipefail

          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}"
          HELM_REGISTRY="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/helm"
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            CONTAINER_TAGS="${IMAGE_REF}:${TAG_VERSION}"$'\n'"${IMAGE_REF}:latest"
            SCAN_TAG="${IMAGE_REF}:${TAG_VERSION}"
            HELM_VERSION="${TAG_VERSION}"
            HELM_MUTABLE_VERSION=""
            CHART_APP_VERSION="${TAG_VERSION}"
            CHART_MUTABLE_APP_VERSION=""
          else
            CONTAINER_TAGS="${IMAGE_REF}:dev-${SHORT_SHA}"$'\n'"${IMAGE_REF}:dev"
            SCAN_TAG="${IMAGE_REF}:dev-${SHORT_SHA}"
            HELM_VERSION="0.0.0-dev.${SHORT_SHA}"
            HELM_MUTABLE_VERSION="0.0.0-dev"
            CHART_APP_VERSION="dev-${SHORT_SHA}"
            CHART_MUTABLE_APP_VERSION="dev"
          fi

          {
            echo "container_tags<<EOF"
            echo "${CONTAINER_TAGS}"
            echo "EOF"
            echo "helm_registry=${HELM_REGISTRY}"
            echo "scan_tag=${SCAN_TAG}"
            echo "helm_version=${HELM_VERSION}"
            echo "helm_mutable_version=${HELM_MUTABLE_VERSION}"
            echo "chart_app_version=${CHART_APP_VERSION}"
            echo "chart_mutable_app_version=${CHART_MUTABLE_APP_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ steps.versions.outputs.container_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: v0.70.0
          image-ref: ${{ steps.versions.outputs.scan_tag }}
          scanners: vuln
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          hide-progress: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.versions.outputs.container_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.20.2

      - name: Package Helm charts
        env:
          CHART_PATH: ${{ env.CHART_PATH }}
          HELM_VERSION: ${{ steps.versions.outputs.helm_version }}
          HELM_MUTABLE_VERSION: ${{ steps.versions.outputs.helm_mutable_version }}
          CHART_APP_VERSION: ${{ steps.versions.outputs.chart_app_version }}
          CHART_MUTABLE_APP_VERSION: ${{ steps.versions.outputs.chart_mutable_app_version }}
        run: |
          set -euo pipefail

          rm -rf chart-out
          mkdir -p chart-out

          package_chart() {
            local version="$1"
            local app_version="$2"

            helm package "${CHART_PATH}" \
              --destination chart-out \
              --version "${version}" \
              --app-version "${app_version}"
          }

          package_chart "${HELM_VERSION}" "${CHART_APP_VERSION}"

          if [[ -n "${HELM_MUTABLE_VERSION}" ]]; then
            package_chart "${HELM_MUTABLE_VERSION}" "${CHART_MUTABLE_APP_VERSION}"
          fi

      - name: Log in to Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm charts
        env:
          HELM_REGISTRY: ${{ steps.versions.outputs.helm_registry }}
        run: |
          set -euo pipefail

          for chart in chart-out/*.tgz; do
            helm push "${chart}" "oci://${HELM_REGISTRY}"
          done
